<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Tunnel — a strange little detour</title>
  <meta name="description" content="A guy. A drain tunnel. 60 miles to his farm. He really wants you to come." />
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="tunnel.css" />
</head>
<body class="tunnel-page">
  <!-- animated background (matches the main page) -->
  <div class="bg">
    <div class="streaks">
      <span class="streak s1"></span>
      <span class="streak s2"></span>
      <span class="streak s3"></span>
      <span class="streak s4"></span>
      <span class="streak s5"></span>
      <span class="streak s6"></span>
    </div>
    <div class="grain"></div>
  </div>

  <header class="tn-topbar reveal">
    <a class="tn-back" href="index.html" aria-label="Back to Daily">
      <span class="tn-back-arrow">←</span>
      <span>Back to Daily</span>
    </a>
    <div class="tn-title-block">
      <div class="tn-eyebrow">A strange little detour</div>
      <h1 class="tn-title">The Tunnel</h1>
    </div>
    <div class="tn-meter" id="tnMeter" title="How hard he's pushing">
      <span class="tn-meter-label">His persistence</span>
      <div class="tn-meter-bar"><span class="tn-meter-fill" id="tnMeterFill"></span></div>
    </div>
  </header>

  <main class="tn-stage reveal" style="--i:2">
    <div class="tn-scene-wrap">
      <!-- Speech bubble (positioned over the scene) -->
      <div class="tn-bubble" id="tnBubble" role="status" aria-live="polite">
        <span class="tn-speaker" id="tnSpeaker">???</span>
        <p class="tn-line" id="tnLine">…</p>
        <span class="tn-bubble-tail" aria-hidden="true"></span>
      </div>

      <!-- The scene: a brown-haired guy in front of a drain tunnel -->
      <svg class="tn-scene" viewBox="0 0 760 520" role="img"
           aria-label="A brown-haired guy standing in front of the mouth of a large drain tunnel, gesturing toward it.">
        <defs>
          <radialGradient id="tnDepth" cx="50%" cy="48%" r="55%">
            <stop offset="0%" stop-color="#000005" />
            <stop offset="55%" stop-color="#0a0a16" />
            <stop offset="100%" stop-color="#1a1830" />
          </radialGradient>
          <linearGradient id="tnWall" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#2a2740" />
            <stop offset="100%" stop-color="#1b1930" />
          </linearGradient>
          <linearGradient id="tnRim" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#4a4668" />
            <stop offset="100%" stop-color="#2d2b45" />
          </linearGradient>
          <linearGradient id="tnGround" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#23314a" />
            <stop offset="100%" stop-color="#141d2e" />
          </linearGradient>
          <linearGradient id="tnWater" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#2bd4c6" stop-opacity="0.55" />
            <stop offset="100%" stop-color="#1f9bff" stop-opacity="0.2" />
          </linearGradient>
        </defs>

        <!-- concrete wall -->
        <rect x="0" y="0" width="760" height="448" fill="url(#tnWall)" />

        <!-- tunnel rim + mouth (depth rings) -->
        <ellipse cx="300" cy="280" rx="200" ry="190" fill="url(#tnRim)" />
        <ellipse cx="300" cy="280" rx="176" ry="166" fill="#15131f" />
        <ellipse cx="300" cy="285" rx="150" ry="142" fill="url(#tnDepth)" />
        <ellipse cx="300" cy="290" rx="108" ry="103" fill="#070710" />
        <ellipse cx="300" cy="296" rx="62" ry="60" fill="#020205" />

        <!-- faint depth rings -->
        <ellipse cx="300" cy="285" rx="150" ry="142" fill="none" stroke="#3a3658" stroke-width="2" opacity="0.5" />
        <ellipse cx="300" cy="290" rx="108" ry="103" fill="none" stroke="#2a2842" stroke-width="2" opacity="0.5" />

        <!-- grime streaks on the rim -->
        <path d="M180 150 q-6 60 4 120" stroke="#15131f" stroke-width="6" fill="none" opacity="0.5" stroke-linecap="round" />
        <path d="M430 140 q10 70 -2 130" stroke="#15131f" stroke-width="5" fill="none" opacity="0.45" stroke-linecap="round" />

        <!-- ground -->
        <rect x="0" y="430" width="760" height="90" fill="url(#tnGround)" />
        <!-- a thin stream trickling out of the tunnel -->
        <path d="M300 430 C 280 450, 250 455, 120 478 L 760 478 L 760 470 C 520 462, 360 452, 320 432 Z"
              fill="url(#tnWater)" opacity="0.7" />
        <ellipse cx="300" cy="432" rx="90" ry="14" fill="#0a0a14" opacity="0.7" />

        <!-- ================= the guy ================= -->
        <g class="tn-guy" id="tnGuy">
          <!-- shadow -->
          <ellipse cx="560" cy="438" rx="62" ry="13" fill="#000" opacity="0.35" />

          <!-- legs -->
          <rect x="533" y="330" width="22" height="104" rx="10" fill="#2f3550" />
          <rect x="566" y="330" width="22" height="104" rx="10" fill="#363c5a" />
          <!-- shoes -->
          <path d="M527 430 h34 a8 8 0 0 1 8 8 v2 h-42 z" fill="#16181f" />
          <path d="M562 430 h34 a8 8 0 0 1 8 8 v2 h-42 z" fill="#0f1117" />

          <!-- torso / jacket -->
          <path d="M520 200 q40 -22 80 0 l10 110 q-50 24 -100 0 z" fill="#5a4af0" />
          <path d="M560 188 l0 122" stroke="#473ad0" stroke-width="3" opacity="0.6" />
          <!-- collar -->
          <path d="M540 196 l20 22 l20 -22 z" fill="#3f33b8" />

          <!-- right arm (his right) pointing toward the tunnel -->
          <path class="tn-arm" id="tnArm"
                d="M527 222 q-60 6 -118 22 q-10 4 -12 12 q4 8 14 6 q70 -12 124 -16 z"
                fill="#5044e0" />
          <!-- pointing hand -->
          <circle cx="392" cy="258" r="13" fill="#f0c9a8" />
          <rect x="372" y="252" width="20" height="9" rx="4" fill="#f0c9a8" />

          <!-- left arm at side -->
          <path d="M600 214 q26 6 30 70 q1 12 -11 12 q-12 0 -14 -12 q-6 -50 -19 -58 z" fill="#5044e0" />
          <circle cx="619" cy="300" r="12" fill="#f0c9a8" />

          <!-- neck -->
          <rect x="551" y="170" width="18" height="26" rx="6" fill="#e8bf9c" />

          <!-- head -->
          <ellipse cx="560" cy="148" rx="36" ry="40" fill="#f2cba9" />
          <!-- ears -->
          <circle cx="525" cy="150" r="7" fill="#eabf99" />
          <circle cx="595" cy="150" r="7" fill="#eabf99" />

          <!-- brown hair -->
          <path d="M523 138
                   q-6 -44 37 -50
                   q43 6 37 50
                   q-3 -18 -16 -22
                   q4 12 -4 16
                   q-6 -14 -20 -14
                   q-14 0 -20 14
                   q-8 -4 -4 -16
                   q-13 4 -10 22 z"
                fill="#6b4423" />
          <path d="M524 136 q10 -10 36 -10 q26 0 36 10 q-4 -22 -36 -24 q-32 2 -36 24 z"
                fill="#7d5430" opacity="0.7" />

          <!-- face -->
          <circle cx="548" cy="146" r="3.4" fill="#2a2030" />
          <circle cx="572" cy="146" r="3.4" fill="#2a2030" />
          <path d="M540 138 q8 -5 16 -1" stroke="#5a3c22" stroke-width="2.4" fill="none" stroke-linecap="round" />
          <path d="M564 137 q8 -4 16 1" stroke="#5a3c22" stroke-width="2.4" fill="none" stroke-linecap="round" />
          <path class="tn-smile" d="M547 163 q13 12 26 0" stroke="#9a5d3a" stroke-width="3" fill="none" stroke-linecap="round" />
          <ellipse cx="535" cy="160" rx="6" ry="4" fill="#f3a98a" opacity="0.5" />
          <ellipse cx="585" cy="160" rx="6" ry="4" fill="#f3a98a" opacity="0.5" />
        </g>
      </svg>
    </div>

    <!-- Dialog choices -->
    <div class="tn-choices" id="tnChoices" aria-label="What do you say?"></div>
    <p class="tn-hint" id="tnHint">Pick a reply. (Spoiler: he is very committed.)</p>
  </main>

  <footer class="tn-footer reveal" style="--i:3">
    <span>You found the tunnel. Nice. There's no prize — just the tunnel.</span>
  </footer>

  <script src="tunnel.js"></script>
</body>
</html>
