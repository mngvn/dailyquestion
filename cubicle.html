<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The 401(k) Guy — a strange little detour</title>
  <meta name="description" content="A coworker who will not stop talking about his 401(k). It escalates." />
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="tunnel.css" />
  <link rel="stylesheet" href="cubicle.css" />
</head>
<body class="tunnel-page">
  <!-- animated background (matches the main page) -->
  <div class="bg">
    <div class="aurora"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
    <div class="grain"></div>
  </div>

  <header class="tn-topbar reveal">
    <a class="tn-back" href="index.html" aria-label="Back to Daily">
      <span class="tn-back-arrow">←</span>
      <span>Back to Daily</span>
    </a>
    <div class="tn-title-block">
      <div class="tn-eyebrow">A strange little detour</div>
      <h1 class="tn-title">The 401(k) Guy</h1>
    </div>
    <div class="tn-meter" id="koMeter" title="How sure he is about your finances">
      <span class="tn-meter-label">His confidence</span>
      <div class="tn-meter-bar"><span class="tn-meter-fill" id="koMeterFill"></span></div>
    </div>
  </header>

  <main class="tn-stage reveal" style="--i:2">
    <div class="tn-scene-wrap ko-wrap">

      <!-- the guy's speech bubble -->
      <div class="tn-bubble ko-mainbubble" id="koBubble" role="status" aria-live="polite">
        <span class="tn-speaker" id="koSpeaker">A coworker</span>
        <p class="tn-line" id="koLine">…</p>
        <span class="tn-bubble-tail" aria-hidden="true"></span>
      </div>

      <!-- The scene: a guy in a cubicle obsessed with his 401(k) -->
      <svg class="tn-scene ko-scene" id="koScene" viewBox="0 0 760 520" role="img"
           aria-label="A man at an office cubicle gesturing at a monitor showing a rising stock chart.">
        <defs>
          <linearGradient id="koWall" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#252c40" />
            <stop offset="100%" stop-color="#1a2030" />
          </linearGradient>
          <linearGradient id="koDesk" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#caa279" />
            <stop offset="100%" stop-color="#a07a52" />
          </linearGradient>
          <linearGradient id="koScreen" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0c1f1a" />
            <stop offset="100%" stop-color="#06120f" />
          </linearGradient>
        </defs>

        <!-- office wall -->
        <rect x="0" y="0" width="760" height="520" fill="url(#koWall)" />

        <!-- cubicle felt panels -->
        <rect x="40" y="60" width="680" height="300" rx="10" fill="#5a5f73" />
        <rect x="40" y="60" width="680" height="16" rx="6" fill="#474b5c" />
        <line x1="270" y1="76" x2="270" y2="360" stroke="#4a4e60" stroke-width="3" />
        <line x1="500" y1="76" x2="500" y2="360" stroke="#4a4e60" stroke-width="3" />
        <!-- felt speckle -->
        <g fill="#646a7e" opacity="0.5">
          <circle cx="120" cy="130" r="2" /><circle cx="200" cy="180" r="2" /><circle cx="350" cy="120" r="2" />
          <circle cx="430" cy="200" r="2" /><circle cx="560" cy="140" r="2" /><circle cx="650" cy="220" r="2" />
          <circle cx="160" cy="260" r="2" /><circle cx="600" cy="300" r="2" /><circle cx="330" cy="300" r="2" />
        </g>

        <!-- pinned sticky note -->
        <g transform="rotate(-5 110 130)">
          <rect x="78" y="100" width="74" height="64" rx="3" fill="#ffe066" />
          <line x1="88" y1="120" x2="142" y2="120" stroke="#b89b2e" stroke-width="3" />
          <line x1="88" y1="134" x2="142" y2="134" stroke="#b89b2e" stroke-width="3" />
          <line x1="88" y1="148" x2="122" y2="148" stroke="#b89b2e" stroke-width="3" />
        </g>

        <!-- monitor -->
        <rect x="150" y="170" width="210" height="140" rx="8" fill="#0a0a12" />
        <rect x="160" y="180" width="190" height="120" rx="4" fill="url(#koScreen)" />
        <!-- rising chart on screen -->
        <polyline points="172,288 200,272 226,278 252,250 280,256 306,222 332,232 346,196"
                  fill="none" stroke="#2fe089" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
        <polygon points="346,196 336,200 346,210" fill="#2fe089" />
        <text x="172" y="202" fill="#2fe089" font-family="Space Grotesk, sans-serif" font-size="16" font-weight="700">401(k) ▲</text>
        <!-- stand -->
        <rect x="245" y="310" width="20" height="26" fill="#0a0a12" />
        <rect x="220" y="336" width="70" height="10" rx="4" fill="#0a0a12" />

        <!-- desk -->
        <rect x="0" y="346" width="760" height="40" fill="url(#koDesk)" />
        <rect x="0" y="386" width="760" height="20" fill="#7c5b38" />

        <!-- coffee mug -->
        <g>
          <rect x="392" y="318" width="40" height="30" rx="5" fill="#e0e4f0" />
          <path d="M432 324 q16 2 16 12 q0 10 -16 12" fill="none" stroke="#e0e4f0" stroke-width="5" />
          <path d="M400 314 q4 -8 0 -14 M414 314 q4 -8 0 -14" stroke="#9aa0c0" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7" />
        </g>

        <!-- chair back behind the guy -->
        <rect x="488" y="150" width="150" height="200" rx="28" fill="#2c3044" />

        <!-- ================= the 401(k) guy ================= -->
        <g class="ko-guy" id="koGuy">
          <!-- torso: collared shirt + tie -->
          <path d="M500 360 q63 -40 126 0 l0 30 l-126 0 z" fill="#2f6fe0" />
          <path d="M500 250 q63 -36 126 0 l0 110 l-126 0 z" fill="#3f7ff0" />
          <!-- collar -->
          <path d="M540 250 l23 26 l23 -26 l-10 -8 l-13 12 l-13 -12 z" fill="#eef2ff" />
          <!-- tie -->
          <path d="M563 262 l-8 8 l8 12 l8 -12 z" fill="#e0463c" />
          <path d="M557 282 l6 64 l6 -64 l-6 6 z" fill="#c83a32" />

          <!-- raised arm gesturing toward the screen -->
          <path class="ko-arm" id="koArm"
                d="M506 268 q-44 -10 -86 -44 q-9 -7 -3 -15 q7 -7 15 -1 q40 30 80 38 z"
                fill="#3f7ff0" />
          <circle cx="424" cy="214" r="13" fill="#f0c9a8" />

          <!-- other arm resting -->
          <path d="M620 270 q30 8 30 70 l-22 0 q-6 -44 -22 -52 z" fill="#3f7ff0" />
          <circle cx="635" cy="338" r="12" fill="#f0c9a8" />

          <!-- neck -->
          <rect x="554" y="222" width="18" height="26" rx="6" fill="#e8bf9c" />

          <!-- head -->
          <ellipse cx="563" cy="196" rx="35" ry="39" fill="#f2cba9" />
          <circle cx="529" cy="198" r="7" fill="#eabf99" />
          <circle cx="597" cy="198" r="7" fill="#eabf99" />

          <!-- hair (neat office cut) -->
          <path d="M528 188 q-6 -42 35 -47 q41 5 35 47 q-4 -16 -16 -20 q-10 -10 -19 -10 q-9 0 -19 10 q-12 4 -16 20 z" fill="#3a2a1c" />
          <path d="M530 184 q14 -14 33 -14 q19 0 33 14 q-6 -20 -33 -22 q-27 2 -33 22 z" fill="#4a3625" opacity="0.7" />

          <!-- glasses -->
          <circle cx="549" cy="196" r="11" fill="none" stroke="#2a2030" stroke-width="2.4" />
          <circle cx="577" cy="196" r="11" fill="none" stroke="#2a2030" stroke-width="2.4" />
          <line x1="560" y1="196" x2="566" y2="196" stroke="#2a2030" stroke-width="2.4" />
          <!-- eyes -->
          <circle cx="549" cy="196" r="3.2" fill="#2a2030" />
          <circle cx="577" cy="196" r="3.2" fill="#2a2030" />
          <!-- enthusiastic open mouth -->
          <ellipse class="ko-mouth" cx="563" cy="218" rx="8" ry="6" fill="#7a3b34" />
          <ellipse cx="548" cy="210" rx="6" ry="4" fill="#f3a98a" opacity="0.5" />
          <ellipse cx="584" cy="210" rx="6" ry="4" fill="#f3a98a" opacity="0.5" />
        </g>
      </svg>
    </div>

    <!-- the absurd retirement readout -->
    <div class="ko-readout" id="koReadout" hidden>
      <span class="ko-readout-label" id="koReadoutLabel">Recommended retirement age</span>
      <span class="ko-readout-value" id="koReadoutValue">—</span>
      <p class="ko-readout-note" id="koReadoutNote"></p>
    </div>

    <div class="tn-choices ko-choices" id="koChoices" aria-label="Answer the financial advisor"></div>
    <p class="tn-hint" id="koHint">He noticed you walk by. There is no escape now.</p>
  </main>

  <footer class="tn-footer reveal" style="--i:3">
    <span>Not financial advice. Especially not from him.</span>
  </footer>

  <script src="cubicle.js"></script>
</body>
</html>
