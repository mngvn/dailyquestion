<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily — Your daily fact, puzzle, history & trivia</title>
  <meta name="description" content="A daily fun fact, puzzle, on-this-day in history, and trivia question. Build your streak!" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- animated background -->
  <div class="bg">
    <div class="grain"></div>
  </div>

  <!-- vibrant cursor-reactive particle field -->
  <canvas id="fxCanvas" class="fx-canvas" aria-hidden="true"></canvas>

  <!-- a soft light that trails the cursor -->
  <div class="pointer-glow" aria-hidden="true"></div>
  <!-- expanding ripples emanate from clicks here -->
  <div id="rippleLayer" class="ripple-layer" aria-hidden="true"></div>

  <div id="confetti" class="confetti-layer" aria-hidden="true"></div>

  <!-- floating controls: theme toggle -->
  <div class="controls" id="controls" role="toolbar" aria-label="Display settings">
    <button class="ctrl-btn" id="themeToggle" type="button" aria-pressed="false" title="Toggle light / dark mode" aria-label="Toggle light or dark mode">🌙</button>
  </div>

  <header class="topbar reveal">
    <div class="brand">
      <span class="logo-dot"></span>
      <span class="brand-name">Daily</span>
    </div>

    <div class="date-block">
      <div class="weekday" id="weekday">—</div>
      <h1 class="date-main" id="dateMain" aria-live="off">Loading…</h1>
      <div class="day-counter" id="dayCounter"></div>
    </div>

    <div class="streak-pill" id="streakPill" title="Your current streak">
      <span class="flame" id="flame">🔥</span>
      <div class="streak-meta">
        <span class="streak-num" id="streakNum">0</span>
        <span class="streak-label">day streak</span>
      </div>
    </div>
  </header>

  <!-- The daily sections, laid out as slices of a pie chart. Each slice is a
       trigger that opens its section in a modal. Built by app.js. -->
  <main class="content">
    <section class="pie-stage reveal" style="--i:1">
      <div class="pie-wrap">
        <svg id="pieSvg" viewBox="0 0 520 520" role="group" aria-label="Today's sections"></svg>
      </div>
    </section>
  </main>

  <footer class="footer reveal" style="--i:2">
    <div class="stat">
      <span class="stat-num" id="statPlayed">0</span>
      <span class="stat-label">days played</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="statBest">0</span>
      <span class="stat-label">best streak</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="statCorrect">0</span>
      <span class="stat-label">trivia correct</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="statAccuracy">—</span>
      <span class="stat-label">accuracy</span>
    </div>
    <a class="egg-link" href="sun.html" title="…do not hold the star" aria-label="A strange little detour: Sunball">☀️</a>
    <a class="egg-link egg-link-2" href="orbit.html" title="…can you make it all the way around?" aria-label="Another strange little detour: Orbit surfer">🛰️</a>
    <a class="egg-link egg-link-3" href="park.html" title="…slide it into the spot" aria-label="A third strange little detour: Drift Park">🅿️</a>
  </footer>

  <!-- Section modal: stays layered over the page so it feels like the same screen -->
  <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="modalClose" type="button" aria-label="Close">&times;</button>
      <div class="modal-head">
        <span class="modal-icon" id="modalIcon"></span>
        <h2 class="modal-title" id="modalTitle"></h2>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="puzzles.js"></script>
  <script src="app.js"></script>
  <script src="interactions.js"></script>
  <script src="trail.js"></script>
  <script src="theme.js"></script>
</body>
</html>
