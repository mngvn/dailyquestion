<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Vibe Coder — a strange little detour</title>
  <meta name="description" content="A 10x engineer who vibe codes, ships to prod, and has never met a bug that wasn't a feature." />
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="tunnel.css" />
  <link rel="stylesheet" href="vibecoder.css" />
</head>
<body class="tunnel-page">
  <div class="bg">
    <div class="streaks">
      <span class="streak s1"></span>
      <span class="streak s2"></span>
      <span class="streak s3"></span>
      <span class="streak s4"></span>
      <span class="streak s5"></span>
      <span class="streak s6"></span>
    </div>
    <div class="grain"></div>
  </div>

  <header class="tn-topbar reveal">
    <a class="tn-back" href="index.html" aria-label="Back to Daily">
      <span class="tn-back-arrow">←</span>
      <span>Back to Daily</span>
    </a>
    <div class="tn-title-block">
      <div class="tn-eyebrow">A strange little detour</div>
      <h1 class="tn-title">The Vibe Coder</h1>
    </div>
    <div class="tn-meter" id="vcMeter" title="How self-assured he is feeling">
      <span class="tn-meter-label">His ego</span>
      <div class="tn-meter-bar"><span class="tn-meter-fill" id="vcMeterFill"></span></div>
    </div>
  </header>

  <main class="tn-stage reveal" style="--i:2">
    <div class="tn-scene-wrap vc-wrap">
      <div class="tn-bubble vc-mainbubble" id="vcBubble" role="status" aria-live="polite">
        <span class="tn-speaker" id="vcSpeaker">???</span>
        <p class="tn-line" id="vcLine">…</p>
        <span class="tn-bubble-tail" aria-hidden="true"></span>
      </div>

      <!-- The scene: a vibe coder at his RGB battle station -->
      <svg class="tn-scene vc-scene" viewBox="0 0 760 520" role="img"
           aria-label="A very confident developer in headphones and sunglasses at a glowing RGB desk setup, code on the monitor.">
        <defs>
          <linearGradient id="vcWall" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#161427" />
            <stop offset="100%" stop-color="#0c0b18" />
          </linearGradient>
          <linearGradient id="vcDesk" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#2a2740" />
            <stop offset="100%" stop-color="#1b1930" />
          </linearGradient>
          <linearGradient id="vcRGB" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ff5c9c" />
            <stop offset="50%" stop-color="#7c5cff" />
            <stop offset="100%" stop-color="#00e0c6" />
          </linearGradient>
          <linearGradient id="vcScreen" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0d1322" />
            <stop offset="100%" stop-color="#070b15" />
          </linearGradient>
          <radialGradient id="vcGlow" cx="50%" cy="60%" r="60%">
            <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.5" />
            <stop offset="100%" stop-color="#7c5cff" stop-opacity="0" />
          </radialGradient>
        </defs>

        <rect x="0" y="0" width="760" height="520" fill="url(#vcWall)" />
        <!-- ambient RGB wall glow -->
        <ellipse cx="250" cy="250" rx="260" ry="200" fill="url(#vcGlow)" />

        <!-- monitor -->
        <rect class="vc-rgbring" x="92" y="120" width="280" height="180" rx="14" fill="url(#vcRGB)" />
        <rect x="100" y="128" width="264" height="164" rx="9" fill="#05060c" />
        <rect x="110" y="138" width="244" height="144" rx="5" fill="url(#vcScreen)" />
        <!-- code lines -->
        <g class="vc-code" font-family="monospace" font-size="11">
          <text x="120" y="156" fill="#c792ea">const</text>
          <text x="166" y="156" fill="#82aaff">vibe</text>
          <text x="202" y="156" fill="#89ddff">=</text>
          <text x="214" y="156" fill="#c3e88d">true</text>
          <text x="120" y="174" fill="#82aaff">ship</text>
          <text x="156" y="174" fill="#ffcb6b">(</text>
          <text x="164" y="174" fill="#c3e88d">'prod'</text>
          <text x="206" y="174" fill="#ffcb6b">)</text>
          <text x="120" y="192" fill="#637777">// TODO: tests?</text>
          <text x="120" y="210" fill="#c792ea">if</text>
          <text x="138" y="210" fill="#ffcb6b">(</text>
          <text x="146" y="210" fill="#82aaff">bug</text>
          <text x="176" y="210" fill="#ffcb6b">)</text>
          <text x="190" y="210" fill="#89ddff">feature++</text>
          <text x="120" y="228" fill="#637777">// works on my machine</text>
          <text x="120" y="246" fill="#f07178">deploy</text>
          <text x="168" y="246" fill="#c3e88d">.friday()</text>
          <rect class="vc-cursor" x="120" y="256" width="7" height="12" fill="#00e0c6" />
        </g>
        <!-- stand -->
        <rect x="222" y="300" width="20" height="24" fill="#05060c" />
        <rect x="196" y="324" width="72" height="9" rx="4" fill="#05060c" />

        <!-- desk -->
        <rect x="0" y="360" width="760" height="44" fill="url(#vcDesk)" />
        <!-- RGB keyboard -->
        <rect class="vc-rgbring" x="150" y="356" width="190" height="22" rx="5" fill="url(#vcRGB)" opacity="0.9" />
        <g fill="#0b0a16">
          <rect x="156" y="360" width="178" height="14" rx="3" />
        </g>
        <!-- energy drink can -->
        <g>
          <rect x="372" y="330" width="26" height="40" rx="4" fill="#1f9bff" />
          <rect x="372" y="342" width="26" height="10" fill="#00e0c6" />
          <rect x="376" y="326" width="18" height="6" rx="2" fill="#9aa0c0" />
        </g>

        <!-- chair back -->
        <rect x="470" y="170" width="170" height="200" rx="30" fill="#211f33" />

        <!-- ================= the vibe coder ================= -->
        <g class="vc-guy" id="vcGuy">
          <!-- hoodie torso -->
          <path d="M486 360 q70 -46 138 0 l0 14 l-138 0 z" fill="#2b2950" />
          <path d="M486 256 q69 -40 138 0 l0 104 l-138 0 z" fill="#34326180" />
          <path d="M486 256 q69 -40 138 0 l0 104 l-138 0 z" fill="#343261" />
          <!-- hood collar -->
          <path d="M520 260 q35 26 70 0 l-8 -16 q-27 16 -54 0 z" fill="#26244a" />
          <!-- drawstrings -->
          <line x1="548" y1="262" x2="546" y2="312" stroke="#cfd2ec" stroke-width="3" />
          <line x1="566" y1="262" x2="568" y2="306" stroke="#cfd2ec" stroke-width="3" />
          <circle cx="546" cy="312" r="3" fill="#cfd2ec" /><circle cx="568" cy="306" r="3" fill="#cfd2ec" />

          <!-- finger-guns arm pointing at you -->
          <path class="vc-arm" id="vcArm" d="M494 286 q-46 8 -86 -2 q-10 -2 -10 -11 q2 -9 12 -8 q44 8 84 4 z" fill="#343261" />
          <!-- hand doing finger guns -->
          <circle cx="404" cy="276" r="13" fill="#f0c9a8" />
          <rect x="378" y="270" width="26" height="9" rx="4" fill="#f0c9a8" />
          <rect x="384" y="262" width="9" height="12" rx="4" fill="#f0c9a8" />

          <!-- other arm resting -->
          <path d="M624 268 q28 8 30 64 l-22 0 q-6 -40 -20 -50 z" fill="#343261" />

          <!-- neck -->
          <rect x="546" y="222" width="20" height="26" rx="6" fill="#e8bf9c" />

          <!-- head -->
          <ellipse cx="556" cy="192" rx="36" ry="40" fill="#f2cba9" />

          <!-- hair (messy, confident) -->
          <path d="M520 184 q-6 -46 36 -50 q42 4 36 50 q-5 -18 -14 -22 q2 12 -6 16 q-4 -16 -16 -16 q-12 0 -16 16 q-8 -4 -6 -16 q-12 4 -14 22 z" fill="#2a1d12" />
          <path d="M522 182 q12 -16 34 -16 q22 0 34 16 q-6 -22 -34 -24 q-28 2 -34 24 z" fill="#3a2a1a" opacity="0.7" />

          <!-- big over-ear headphones -->
          <path d="M518 168 q38 -44 76 0" fill="none" stroke="#15131f" stroke-width="9" stroke-linecap="round" />
          <rect class="vc-rgbring" x="506" y="178" width="20" height="40" rx="9" fill="url(#vcRGB)" />
          <rect class="vc-rgbring" x="586" y="178" width="20" height="40" rx="9" fill="url(#vcRGB)" />

          <!-- sunglasses (indoors, obviously) -->
          <rect x="528" y="186" width="26" height="16" rx="6" fill="#0a0a12" />
          <rect x="558" y="186" width="26" height="16" rx="6" fill="#0a0a12" />
          <line x1="554" y1="192" x2="558" y2="192" stroke="#0a0a12" stroke-width="4" />
          <rect class="vc-shade" x="531" y="189" width="9" height="4" rx="2" fill="#5ad6ff" opacity="0.6" />
          <rect class="vc-shade" x="561" y="189" width="9" height="4" rx="2" fill="#5ad6ff" opacity="0.6" />

          <!-- smug smirk -->
          <path class="vc-smirk" d="M546 214 q12 8 24 -1" stroke="#9a5d3a" stroke-width="3" fill="none" stroke-linecap="round" />
        </g>

        <!-- floating vibe sparkles -->
        <g class="vc-sparkles" fill="#ffd86b" font-size="20" font-family="sans-serif">
          <text class="vc-spark s1" x="430" y="150">✨</text>
          <text class="vc-spark s2" x="650" y="200">✨</text>
          <text class="vc-spark s3" x="620" y="120">✦</text>
        </g>
      </svg>
    </div>

    <div class="tn-choices vc-choices" id="vcChoices" aria-label="What do you say to him?"></div>
    <p class="tn-hint" id="vcHint">He has airpods in but he can definitely hear you. He's choosing not to.</p>
  </main>

  <footer class="tn-footer reveal" style="--i:3">
    <span>No code was read in the making of this feature.</span>
  </footer>

  <script src="vibecoder.js"></script>
</body>
</html>
